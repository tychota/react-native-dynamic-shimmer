name: Feature request
description: Suggest a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes: { label: "What would you like?" }
    validations: { required: true }
  - type: textarea
    id: why
    attributes: { label: "Why do you need it?" }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: "Alternatives you've considered" }
